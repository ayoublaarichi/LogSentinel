{% extends "base.html" %}
{% block title %}LogSentinel — Events Investigation{% endblock %}
{% block nav_events %}active{% endblock %}

{% block head %}
<!-- Chart.js for timeline -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<!-- Events investigation theme -->
<link rel="stylesheet" href="/static/css/events.css">
<style>
    /* Override container padding for full-height workspace */
    main.container-fluid { padding-left: 0 !important; padding-right: 0 !important; }
    footer { display: none !important; }
</style>
{% endblock %}

{% block content %}
<!-- ═══════════════════════════════════════════════════════════
     Events Investigation  —  Wireshark-style 3-pane interface
     ═══════════════════════════════════════════════════════════ -->
<div id="ls-events-page" data-on-vercel="{{ '1' if on_vercel else '0' }}">

    <!-- ── Filter Bar (FilterBar.js mounts here) ───────────────────────── -->
    <div id="ls-filterbar"></div>

    <!-- ── Timeline strip (collapsible) ──────────────────────────────────  -->
    <div id="ls-timeline-bar">
        <button id="ls-timeline-toggle" title="Toggle timeline">
            <i class="bi bi-chevron-up"></i> Hide
        </button>
        <div style="display:flex;align-items:center;gap:8px;height:18px;margin-bottom:2px">
            <i class="bi bi-bar-chart-line-fill" style="color:#58a6ff;font-size:0.8rem"></i>
            <span id="ls-timeline-title" style="font-size:0.72rem;color:#8b949e;letter-spacing:0.04em">
                Events over time (last 24 h)
            </span>
            <div class="ms-auto d-flex align-items-center" style="gap:6px;margin-right:8px">
                <label for="ls-project-select" style="font-size:0.72rem;color:#8b949e">Project</label>
                <select id="ls-project-select" class="form-select form-select-sm"
                        style="min-width:170px;background:#0d1117;border-color:#30363d;color:#c9d1d9;padding:2px 22px 2px 8px;height:28px">
                    <option value="">All visible</option>
                </select>
                <button id="ls-project-new" class="ls-action-btn" title="Create project">
                    <i class="bi bi-folder-plus"></i>
                </button>
                <button id="ls-project-delete" class="ls-action-btn" title="Delete selected project">
                    <i class="bi bi-trash"></i>
                </button>
            </div>
            <button id="ls-seed-demo"
                    class="ls-action-btn" style="margin-right:8px" title="Generate demo events">
                <i class="bi bi-stars"></i> Seed Demo Events
            </button>
            <button id="ls-seed-delete"
                    class="ls-action-btn" style="margin-right:8px" title="Delete seed-generated demo events">
                <i class="bi bi-trash3"></i> Delete Seed Events
            </button>
            <button onclick="window.lsApp?.reload?.()"
                    class="ls-action-btn" style="margin-right:28px" title="Reload all data">
                <i class="bi bi-arrow-clockwise"></i> Reload
            </button>
            <button onclick="window.lsApp?.loadMore?.()"
                    class="ls-action-btn" style="margin-right:12px" title="Load more events">
                <i class="bi bi-list-ul"></i> Load More
            </button>
        </div>
        <canvas id="timelineCanvas" height="70"></canvas>
    </div>

    <!-- ── Main Workspace (table LEFT + detail RIGHT) ─────────────────── -->
    <div id="ls-workspace">

        <!-- Virtual-scroll events table (EventTable.js mounts here) -->
        <div id="ls-table-pane"></div>

        <!-- Detail + raw-log panel -->
        <div id="ls-detail-pane">
            <!-- EventDetails.js mounts here -->
            <div id="ls-event-details"></div>
            <!-- RawLogViewer.js mounts here -->
            <div id="ls-raw-pane"></div>
        </div>

    </div>

</div><!-- /#ls-events-page -->

<!-- Toast notification area -->
<div id="ls-toast-area"></div>
{% endblock %}

{% block scripts %}
<!-- ES module entry point — loads all 5 components + state manager -->
<script type="module" src="/static/js/events-app.js"></script>
<script>
    /* Height calibration: fill available viewport below base padding */
    function calibrateHeight() {
        const page = document.getElementById('ls-events-page');
        if (!page) return;
        const topOffset = page.getBoundingClientRect().top + window.scrollY;
        const available = window.innerHeight - topOffset - 4;
        page.style.height = Math.max(400, available) + 'px';
    }
    calibrateHeight();
    window.addEventListener('resize', calibrateHeight);
</script>
{% endblock %}

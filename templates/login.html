{% extends "base.html" %}
{% block title %}LogSentinel — Login{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-lg-5 col-md-7 col-sm-10">
        <div class="card bg-dark border-secondary">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <i class="bi bi-shield-lock-fill fs-1 text-info"></i>
                    <h4 class="mt-2 fw-bold">
                        Log<span class="text-info">Sentinel</span>
                    </h4>
                    <p class="text-muted small mb-0">Sign in to your SOC dashboard</p>
                </div>

                {% if error %}
                <div class="alert py-2 px-3 mb-3"
                     style="background:rgba(255,45,85,0.1);border:1px solid rgba(255,45,85,0.3);
                            color:#ff7b72;font-size:.85rem;border-radius:6px">
                    <i class="bi bi-exclamation-circle me-1"></i>{{ error }}
                </div>
                {% endif %}

                {% if info %}
                <div class="alert py-2 px-3 mb-3"
                     style="background:rgba(63,185,80,0.12);border:1px solid rgba(63,185,80,0.35);
                            color:#7ee787;font-size:.85rem;border-radius:6px">
                    <i class="bi bi-check-circle me-1"></i>{{ info }}
                </div>
                {% endif %}

                <form method="POST" action="/login">
                    <input type="hidden" name="next" value="{{ next|default('/') }}">
                    <div class="mb-3">
                        <label class="form-label small"
                               style="color:var(--ls-text-muted);text-transform:uppercase;
                                      letter-spacing:.06em;font-size:.72rem">Email</label>
                        <input type="email" name="email" required autofocus
                               class="form-control bg-dark text-light border-secondary"
                               placeholder="analyst@example.com"
                               style="font-family:var(--ls-font-mono);font-size:.85rem">
                    </div>
                    <div class="mb-4">
                        <label class="form-label small"
                               style="color:var(--ls-text-muted);text-transform:uppercase;
                                      letter-spacing:.06em;font-size:.72rem">Password</label>
                        <input type="password" name="password" required
                               class="form-control bg-dark text-light border-secondary"
                               placeholder="••••••••"
                               style="font-size:.85rem">
                        <div class="d-flex justify-content-between align-items-center mt-2">
                            <div class="form-check">
                                <input type="checkbox" name="remember" value="1"
                                       class="form-check-input" id="rememberMe"
                                       style="background-color:transparent;border-color:#30363d">
                                <label class="form-check-label small text-muted" for="rememberMe">Stay logged in</label>
                            </div>
                            <a href="/forgot-password" class="small text-info text-decoration-none">Lost password?</a>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-info w-100 fw-semibold">
                        <i class="bi bi-box-arrow-in-right me-1"></i>Sign In
                    </button>
                </form>

                <div class="text-center mt-3">
                    <span class="text-muted small">Don't have an account?</span>
                    <a href="/signup" class="text-info small ms-1">Sign Up</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

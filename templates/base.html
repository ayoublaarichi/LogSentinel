<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LogSentinel{% endblock %}</title>

    <!-- Bootstrap 5.3 dark theme -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
          rel="stylesheet">
    <!-- Custom SOC theme -->
    <link href="/static/css/style.css" rel="stylesheet">
    {% block head %}{% endblock %}
</head>
<body>

<!-- ── Top Navbar ─────────────────────────────────────────────────────── -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-secondary fixed-top">
    <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center gap-2" href="/">
            <i class="bi bi-shield-lock-fill text-info fs-4"></i>
            <span class="fw-bold">Log<span class="text-info">Sentinel</span></span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navMain">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMain">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link {% block nav_dashboard %}{% endblock %}"
                       href="/"><i class="bi bi-speedometer2 me-1"></i>Dashboard</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% block nav_upload %}{% endblock %}"
                       href="/upload"><i class="bi bi-cloud-arrow-up me-1"></i>Upload</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% block nav_events %}{% endblock %}"
                       href="/events"><i class="bi bi-list-ul me-1"></i>Events</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% block nav_alerts %}{% endblock %}"
                       href="/alerts"><i class="bi bi-exclamation-triangle me-1"></i>Alerts</a>
                </li>
            </ul>
            <span class="navbar-text small text-secondary">
                <i class="bi bi-clock me-1"></i><span id="clock"></span>
            </span>
        </div>
    </div>
</nav>

<!-- ── Main content ──────────────────────────────────────────────────── -->
<main class="container-fluid mt-5 pt-4 px-4">
    {% block content %}{% endblock %}
</main>

<!-- ── Footer ────────────────────────────────────────────────────────── -->
<footer class="text-center text-secondary small py-3 mt-4 border-top border-secondary">
    LogSentinel v1.0.0 &mdash; SOC Log Analyzer &amp; Detection Dashboard
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<!-- App JS -->
<script src="/static/js/app.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>

<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LogSentinel{% endblock %}</title>

    <!-- JetBrains Mono — terminal / monospace font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap"
          rel="stylesheet">

    <!-- Bootstrap 5.3 dark theme -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
          rel="stylesheet">

    <!-- LogSentinel SOC theme -->
    <link href="/static/css/style.css" rel="stylesheet">

    {% block head %}{% endblock %}
</head>
<body>

<!-- ── Top Navbar ───────────────────────────────────────────────────────── -->
<nav class="navbar navbar-expand-lg navbar-dark fixed-top" style="position:relative">
    <div class="container-fluid px-3">

        <!-- Brand -->
        <a class="navbar-brand d-flex align-items-center gap-2" href="/">
            <i class="bi bi-shield-lock-fill text-info fs-5 brand-icon"></i>
            <span class="fw-bold" style="letter-spacing:0.01em">
                Log<span class="text-info">Sentinel</span>
            </span>
            <span class="ls-live-dot ms-1" title="System active"></span>
        </a>

        <button class="navbar-toggler border-0" type="button"
                data-bs-toggle="collapse" data-bs-target="#navMain"
                style="box-shadow:none">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navMain">
            <!-- Navigation links -->
            <ul class="navbar-nav me-auto mb-2 mb-lg-0 gap-1">
                <li class="nav-item">
                    <a class="nav-link {% block nav_dashboard %}{% endblock %}" href="/">
                        <i class="bi bi-speedometer2 me-1"></i>Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% block nav_upload %}{% endblock %}" href="/upload">
                        <i class="bi bi-cloud-arrow-up me-1"></i>Upload
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% block nav_events %}{% endblock %}" href="/events">
                        <i class="bi bi-list-ul me-1"></i>Events
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% block nav_alerts %}{% endblock %}" href="/alerts"
                       id="navAlerts">
                        <i class="bi bi-exclamation-triangle me-1"></i>Alerts
                        <span id="alertDot" class="badge ms-1 d-none"
                              style="font-size:0.62rem;padding:2px 5px;border-radius:3px;
                                     background:rgba(248,81,73,0.2);color:#ff7b72;
                                     border:1px solid rgba(248,81,73,0.4)">!</span>
                    </a>
                </li>
            </ul>

            <!-- Right status bar -->
            <div class="d-flex align-items-center gap-3 me-1">
                <!-- Threat level pill -->
                <div id="threatLevel"
                     class="d-none d-lg-flex align-items-center gap-1"
                     style="font-size:0.72rem;font-family:var(--ls-font-mono)">
                    <span class="text-muted">threat:</span>
                    <span id="threatText" class="fw-bold" style="color:#4d9eff">—</span>
                </div>

                <!-- Live clock -->
                <span class="d-none d-sm-flex align-items-center gap-1"
                      style="font-size:0.75rem;font-family:var(--ls-font-mono);color:var(--ls-text-muted)">
                    <i class="bi bi-clock" style="font-size:0.7rem"></i>
                    <span id="clock"></span>
                </span>
            </div>
        </div>
    </div>
</nav>

<!-- ── Main content ─────────────────────────────────────────────────────── -->
<main class="container-fluid mt-5 pt-4 px-4">
    {% block content %}{% endblock %}
</main>

<!-- ── Footer ───────────────────────────────────────────────────────────── -->
<footer class="text-center py-3 mt-4 border-top"
        style="border-color:var(--ls-border)!important;font-size:0.74rem;
               font-family:var(--ls-font-mono);color:var(--ls-text-dim)">
    <span class="text-muted" style="color:var(--ls-text-dim)!important">
        LogSentinel v1.0.0
        <span style="margin:0 8px;color:var(--ls-border-2)">|</span>
        SOC Log Analyzer &amp; Detection Dashboard
        <span style="margin:0 8px;color:var(--ls-border-2)">|</span>
        <i class="bi bi-shield-check me-1"></i>Powered by FastAPI + SQLite
    </span>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<!-- App JS -->
<script src="/static/js/app.js"></script>

<script>
/* ── Global tooltip init ──────────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('[data-bs-toggle="tooltip"]').forEach(el =>
        new bootstrap.Tooltip(el, { trigger: 'hover focus', delay: { show: 300, hide: 0 } })
    );
});

/* ── Threat level indicator ───────────────────────────────────────────── */
(async () => {
    try {
        const r = await fetch('/api/alerts/stats');
        if (!r.ok) return;
        const s = await r.json();
        const total  = (s.critical || 0) + (s.high || 0) + (s.medium || 0);
        const pill   = document.getElementById('threatLevel');
        const text   = document.getElementById('threatText');
        const dot    = document.getElementById('alertDot');
        if (!pill || !text) return;
        pill.classList.remove('d-none');
        pill.classList.add('d-lg-flex');
        if (s.critical > 0) {
            text.textContent = 'CRITICAL';
            text.style.color = '#ff2d55';
            text.style.textShadow = '0 0 8px rgba(255,45,85,0.7)';
            if (dot) { dot.classList.remove('d-none'); dot.textContent = s.critical; }
        } else if (s.high > 0) {
            text.textContent = 'HIGH';
            text.style.color = '#ff7b72';
            text.style.textShadow = '0 0 6px rgba(248,81,73,0.5)';
            if (dot) { dot.classList.remove('d-none'); dot.textContent = s.high; }
        } else if (s.medium > 0) {
            text.textContent = 'MEDIUM';
            text.style.color = '#e8853d';
        } else {
            text.textContent = 'CLEAR';
            text.style.color = '#3fb950';
        }
    } catch (_) {}
})();
</script>
{% block scripts %}{% endblock %}
</body>
</html>

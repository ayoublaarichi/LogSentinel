{% extends "base.html" %}
{% block title %}LogSentinel — Set New Password{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-lg-5 col-md-7 col-sm-10">
        <div class="card bg-dark border-secondary">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <i class="bi bi-shield-lock-fill fs-1 text-info"></i>
                    <h4 class="mt-2 fw-bold">Set New <span class="text-info">Password</span></h4>
                    <p class="text-muted small mb-0">Choose a new password for your account</p>
                </div>

                {% if error %}
                <div class="alert py-2 px-3 mb-3"
                     style="background:rgba(255,45,85,0.1);border:1px solid rgba(255,45,85,0.3);
                            color:#ff7b72;font-size:.85rem;border-radius:6px">
                    <i class="bi bi-exclamation-circle me-1"></i>{{ error }}
                </div>
                {% endif %}

                {% if token %}
                <form method="POST" action="/reset-password">
                    <input type="hidden" name="token" value="{{ token }}">

                    <div class="mb-3">
                        <label class="form-label small"
                               style="color:var(--ls-text-muted);text-transform:uppercase;
                                      letter-spacing:.06em;font-size:.72rem">New Password</label>
                        <input type="password" name="password" required
                               class="form-control bg-dark text-light border-secondary"
                               placeholder="••••••••"
                               style="font-size:.85rem">
                    </div>

                    <div class="mb-4">
                        <label class="form-label small"
                               style="color:var(--ls-text-muted);text-transform:uppercase;
                                      letter-spacing:.06em;font-size:.72rem">Confirm Password</label>
                        <input type="password" name="password2" required
                               class="form-control bg-dark text-light border-secondary"
                               placeholder="••••••••"
                               style="font-size:.85rem">
                    </div>

                    <button type="submit" class="btn btn-info w-100 fw-semibold">
                        <i class="bi bi-check2-circle me-1"></i>Update Password
                    </button>
                </form>
                {% else %}
                <div class="text-center mt-2">
                    <a href="/forgot-password" class="btn btn-outline-info btn-sm">Request New Link</a>
                </div>
                {% endif %}

                <div class="text-center mt-3">
                    <a href="/login" class="text-info small">Back to Sign In</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
